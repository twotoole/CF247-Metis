<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="white"/>

  <!-- Outer double ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#111" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="43.5" fill="none" stroke="#111" stroke-width="0.5"/>

  <!-- Art Deco tick marks between rings (16 x 22.5deg) -->
  <g fill="none" stroke="#111" stroke-width="0.8">
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(0 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(22.5 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(45 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(67.5 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(90 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(112.5 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(135 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(157.5 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(180 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(202.5 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(225 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(247.5 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(270 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(292.5 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(315 50 50)"/>
    <line x1="50" y1="3" x2="50" y2="6.5" transform="rotate(337.5 50 50)"/>
  </g>

  <!-- Inner content ring -->
  <circle cx="50" cy="50" r="39" fill="none" stroke="#111" stroke-width="0.75"/>

  <!-- Art Deco stepped crown -->
  <path d="M 42,25 L 42,21 L 45,21 L 45,18 L 47,18 L 47,15 L 50,12 L 53,15 L 53,18 L 55,18 L 55,21 L 58,21 L 58,25 Z"
        fill="none" stroke="#111" stroke-width="1" stroke-linejoin="miter"/>

  <!-- Head -->
  <ellipse cx="50" cy="34" rx="8" ry="9" fill="none" stroke="#111" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="46.5" cy="33" r="0.9" fill="#111"/>
  <circle cx="53.5" cy="33" r="0.9" fill="#111"/>

  <!-- Nose -->
  <line x1="50" y1="35" x2="50" y2="37" stroke="#111" stroke-width="0.6"/>

  <!-- Neck -->
  <line x1="46.5" y1="43" x2="46.5" y2="47" stroke="#111" stroke-width="0.9"/>
  <line x1="53.5" y1="43" x2="53.5" y2="47" stroke="#111" stroke-width="0.9"/>

  <!-- Bust and shoulders -->
  <path d="M 24,68 C 30,51 41,47 46.5,47" fill="none" stroke="#111" stroke-width="1.1"/>
  <path d="M 53.5,47 C 59,47 70,51 76,68" fill="none" stroke="#111" stroke-width="1.1"/>
  <line x1="24" y1="68" x2="76" y2="68" stroke="#111" stroke-width="1.1"/>

  <!-- Art Deco side chevrons -->
  <path d="M 31,54 L 27.5,58 L 31,62" fill="none" stroke="#111" stroke-width="0.75"/>
  <path d="M 69,54 L 72.5,58 L 69,62" fill="none" stroke="#111" stroke-width="0.75"/>

  <!-- Diamond ornaments -->
  <path d="M 27.5,55.5 L 29.5,58 L 27.5,60.5 L 25.5,58 Z" fill="#111"/>
  <path d="M 72.5,55.5 L 74.5,58 L 72.5,60.5 L 70.5,58 Z" fill="#111"/>

  <!-- METIS text along bottom arc -->
  <defs>
    <path id="arc" d="M 17,50 A 33,33 0 0,1 83,50"/>
  </defs>
  <text fill="#111" font-size="6" font-family="serif" letter-spacing="1.5">
    <textPath href="#arc" startOffset="50%" text-anchor="middle">METIS</textPath>
  </text>
</svg>
