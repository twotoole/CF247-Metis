<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Black seal -->
  <circle cx="50" cy="50" r="50" fill="#0d0d0d"/>

  <!-- Border rings -->
  <circle cx="50" cy="50" r="47.5" fill="none" stroke="white" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="43.5" fill="none" stroke="white" stroke-width="0.4"/>

  <!-- Text arc paths -->
  <defs>
    <path id="top" d="M 9.5,50 A 40.5,40.5 0 0,1 90.5,50"/>
    <path id="bot" d="M 13,50 A 37,37 0 0,0 87,50"/>
  </defs>

  <text fill="white" font-size="7" font-family="Georgia,serif" font-weight="bold" letter-spacing="3.5">
    <textPath href="#top" startOffset="50%" text-anchor="middle">CF247</textPath>
  </text>
  <text fill="white" font-size="6.5" font-family="Georgia,serif" font-weight="bold" letter-spacing="3">
    <textPath href="#bot" startOffset="50%" text-anchor="middle">METIS ·</textPath>
  </text>

  <!-- Hair above head -->
  <path d="M 46.5,22 C 47,18.5 50,17 53,18 C 55,19 55.5,21.5 54.5,22" fill="white"/>

  <!-- Head -->
  <ellipse cx="50" cy="26.5" rx="4.3" ry="5.3" fill="white"/>

  <!-- Neck -->
  <path d="M 48,31.8 L 47.5,35 L 52.5,35 L 52,31.8 Z" fill="white"/>

  <!-- Raised right arm + hand going upper-right holding torch -->
  <path d="M 52.5,36
           C 56,31 60,25.5 63,22
           C 64,21 65.5,21.5 65,22.5
           C 62,26 58,31.5 54.5,37 Z"
        fill="white"/>

  <!-- Torch flame -->
  <path d="M 63,21.5 C 61.5,18 64,15.5 65.5,17.5
           C 66.5,15 68,16.5 67,19.5
           C 68.5,17 69.5,18.5 68,21.5
           C 67,19 65,19.5 63,21.5 Z"
        fill="white"/>

  <!-- Left arm hanging / holding robe -->
  <path d="M 48,35
           C 45.5,41 43,49 42,57
           L 44,57.5
           C 45,49.5 47.5,41.5 50.5,35 Z"
        fill="white"/>

  <!-- Main robe body -->
  <path d="M 46.5,35
           C 41,38.5 38,46 38,54
           C 37,63 39,72 41.5,79
           L 58.5,79
           C 61,72 63,63 62,54
           C 62,46 59,38.5 53.5,35 Z"
        fill="white"/>

  <!-- Belt -->
  <path d="M 39,52.5 Q 50,51 61,52.5" fill="none" stroke="#0d0d0d" stroke-width="1"/>

  <!-- Robe folds -->
  <path d="M 50,52.5 L 49.5,79" fill="none" stroke="#0d0d0d" stroke-width="0.65"/>
  <path d="M 44.5,56 C 44,65 44.5,73 45.5,79" fill="none" stroke="#0d0d0d" stroke-width="0.5"/>
  <path d="M 55.5,56 C 56,65 55.5,73 54.5,79" fill="none" stroke="#0d0d0d" stroke-width="0.5"/>

  <!-- Feet at hem -->
  <ellipse cx="45.5" cy="80" rx="2.5" ry="1.3" fill="white"/>
  <ellipse cx="54.5" cy="80" rx="2.5" ry="1.3" fill="white"/>

</svg>
